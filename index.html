<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANTED: Villians</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=PT+Serif:ital,wght@1,700&family=Rye&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="wv-reveal.css">
</head>
<body class="wv-reveal-page">
    <div class="wv-scene">
        <div class="wv-frame">
            <img class="wv-layer wv-bg" src="images/WVBG.PNG" alt="">
            <div class="wv-letters" aria-label="W and V">
                <div class="wv-float-wrap wv-v-wrap">
                    <img class="wv-layer wv-letter-glow wv-v-glow" src="images/V.PNG" alt="" aria-hidden="true">
                    <img class="wv-layer wv-v" src="images/V.PNG" alt="">
                </div>
                <div class="wv-float-wrap wv-w-wrap">
                    <img class="wv-layer wv-letter-glow wv-w-glow" src="images/W.PNG" alt="" aria-hidden="true">
                    <img class="wv-layer wv-w" src="images/W.PNG" alt="">
                </div>
            </div>
        </div>
    </div>

    <div class="wv-do-not-press-wrap">
        <button type="button" class="wv-do-not-press" id="wv-do-not-press-btn">DO NOT PRESS!</button>
    </div>

    <div class="wv-explosion" id="wv-explosion" aria-hidden="true">
        <div class="wv-explosion-flash"></div>
        <div class="wv-explosion-core">
            <div class="wv-explosion-star"></div>
            <div class="wv-explosion-ring"></div>
            <div class="wv-explosion-ring wv-explosion-ring--delay"></div>
            <div class="wv-explosion-ring wv-explosion-ring--delay2"></div>
        </div>
        <p class="wv-explosion-boom">BOOM!</p>
        <div class="wv-explosion-smoke" aria-hidden="true">
            <div class="wv-explosion-smoke-veil"></div>
            <span class="wv-smoke-puff"></span>
            <span class="wv-smoke-puff"></span>
            <span class="wv-smoke-puff"></span>
            <span class="wv-smoke-puff"></span>
            <span class="wv-smoke-puff"></span>
            <span class="wv-smoke-puff"></span>
        </div>
        <div class="wv-explosion-particles" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
        </div>
    </div>

    <script src="wv-audio.js"></script>
    <script src="wv-home.js"></script>
</body>
</html>
